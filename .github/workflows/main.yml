name: Export Godot Game

on:
  push:
    branches: [main]

jobs:
  export:
    name: Export for Windows
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6

      - uses: chickensoft-games/setup-godot@v2
        name: Setup Godot
        with:
          # Version must include major, minor, and patch, and be >= 4.0.0
          # Pre-release label is optional.
          version:
            4.4.1 # also valid: 4.0.0.rc1 or 4.0.0 or "global.json", etc
            # Use .NET-enabled version of Godot (the default is also true).
          use-dotnet:
            true
            # Include the Godot Export Templates (the default is false).
          include-templates: true

      - name: Export Project (Windows)
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/hyper_slash.exe

      - name: Export Project (Mac)
        run: |
          mkdir -p build/mac
          godot --headless --export-release "macOS" build/mac/hyper_slash.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac Build
          path: build/mac/
